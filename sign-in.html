<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Treasure Hunt</title>
    <link rel="stylesheet" href="style.css?v=15" />
</head>
<body>

    <div class="secondary-page">
        <h1>Create Account</h1>
        <form id="signin-form">
            <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" maxlength="50" required>
            <input type="password" id="password" name="password" placeholder="Choose a password" autocomplete="new-password" minlength="6" required>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" autocomplete="new-password" minlength="6" required>
            <button type="submit">Create Account</button>
        </form>
        <p id="form-message" class="form-message"></p>
        <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
        <a href="index.html">Back to map</a>
    </div>

    <script type="module" src="dist/sign-in.js"></script>
</body>
</html>
