<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Hunt</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="topo-container">
        <div class="auth-botoes">
            <button class="login">LOGIN</button>
            <button class="sign-in">SIGN-IN</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="secao-inferior">
        <div class="botoes-inferiores">
            <button class="achievements">ACHIEVEMENTS</button>
            <button class="quest">QUEST</button>
            <button class="extra-points">EXTRA POINTS</button>
        </div>

        <div class="leaderboard">
            <h3>🏆 Leaderboard</h3>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jogador</th>
                        <th>Pontos</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="top1">
                        <td>1</td>
                        <td>Jogador1</td>
                        <td>120</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Jogador2</td>
                        <td>95</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Jogador3</td>
                        <td>80</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="dist/script.js"></script>
</body>
</html>
